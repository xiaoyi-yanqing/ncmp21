name: Auto Score

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 (北京时间 8:00) 触发
  workflow_dispatch:

jobs:
  score:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: 随机延迟 (Random Delay)
      run: |
        # 生成 0 到 18000 秒（5小时）的随机数并休眠
        # 配合上面的定时，实现北京时间 8:00 到 13:00 之间的随机执行
        DELAY=$((RANDOM % 18000))
        echo "休眠 $DELAY 秒..."
        # sleep $DELAY

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run script
      env:
        MUSIC_U: ${{ secrets.MUSIC_U }}
        CSRF: ${{ secrets.CSRF }}
        NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        WAIT_TIME_MIN: ${{ secrets.WAIT_TIME_MIN }}
        WAIT_TIME_MAX: ${{ secrets.WAIT_TIME_MAX }}
        SCORE: ${{ secrets.SCORE }}
        FULL_EXTRA_TASKS: ${{ secrets.FULL_EXTRA_TASKS }}
      run: python main.py 
